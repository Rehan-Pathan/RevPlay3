<div class="container-fluid py-4" *ngIf="isLoggedIn">

  <div class="col-md-9 mx-auto">

    <div class="card bg-dark text-light shadow-lg border border-secondary p-4">

      <h2 class="fw-bold mb-4 text-center">My Playlists</h2>

      <!-- Notification -->
      <div *ngIf="message"
           class="p-2 mb-3 text-center rounded col-md-6 mx-auto"
           [ngClass]="isSuccess ? 'bg-success text-white' : 'bg-danger text-white'">
        {{ message }}
      </div>

      <!-- Create Playlist -->
      <div class="mb-4">
        <input class="form-control bg-black text-light border-secondary"
               placeholder="New Playlist Name"
               [(ngModel)]="playlistName">

        <button class="btn btn-secondary mt-3"
                (click)="createPlaylist()">
          Create Playlist
        </button>
      </div>

      <hr class="border-secondary">

      <!-- Playlist List -->
      <ul class="list-group list-group-flush mb-4">

        <li *ngFor="let p of playlists; trackBy: trackById"
            class="list-group-item bg-dark text-light border-secondary d-flex justify-content-between align-items-center">

          <span (click)="selectPlaylist(p)"
                class="fw-semibold"
                style="cursor:pointer">
            {{ p.name }}
          </span>

          <button class="btn btn-sm btn-danger"
                  (click)="deletePlaylist(p.id)">
            Delete
          </button>

        </li>

      </ul>

      <!-- Selected Playlist Songs -->
      <div *ngIf="selectedPlaylist">

        <h4 class="fw-bold mb-3">
          {{ selectedPlaylist.name }} Songs
        </h4>

        <div class="card bg-black text-light border border-secondary shadow-sm p-3">

          <table class="table table-dark table-hover align-middle mb-0">

            <thead>
              <tr>
                <th>Cover</th>
                <th>Title</th>
                <th>Genre</th>
                <th>Artist</th>
                <th>Listen</th>
                <th>Remove</th>
              </tr>
            </thead>

            <tbody>

              <tr *ngFor="let ps of selectedPlaylist.songs; trackBy: trackById">

                <td style="width:80px;">
                  <img
                    [src]="'http://localhost:8080' + ps.song.coverImagePath"
                    width="60"
                    height="40"
                    class="rounded shadow-sm">
                </td>

                <td class="fw-semibold">
                  {{ ps.song.title }}
                </td>

                <td>
                  <span class="badge bg-secondary">
                    {{ ps.song.genre }}
                  </span>
                </td>

                <td>
                  {{ ps.song.artist?.username }}
                </td>

                <td style="min-width:220px;">
                  <audio controls
                         class="w-100"
                         [src]="'http://localhost:8080' + ps.song.audioPath">
                  </audio>
                </td>

                <td>
                  <button class="btn btn-sm btn-danger w-100"
                          (click)="removeSong(ps.song.id)">
                    Remove
                  </button>
                </td>

              </tr>

            </tbody>

          </table>

        </div>

      </div>

    </div>

  </div>

</div>
