<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">

  <div class="col-11 col-sm-8 col-md-6 col-lg-5">

    <div class="card bg-dark text-light shadow-lg border border-secondary">

      <div class="card-body p-4">

        <h3 class="mb-4 fw-bold text-center">Upload Song</h3>

        <!-- Notification Box -->
        <div *ngIf="message"
             class="p-2 mb-3 text-center rounded"
             [ngClass]="isSuccess ? 'bg-success text-white' : 'bg-danger text-white'">
          {{ message }}
        </div>

        <!-- Title -->
        <div class="mb-3">
          <label class="form-label">Title</label>
          <input class="form-control bg-black text-light border-secondary"
                 placeholder="Enter song title"
                 [(ngModel)]="uploadTitle">
        </div>

        <!-- Genre -->
        <div class="mb-3">
          <label class="form-label">Genre</label>
          <input class="form-control bg-black text-light border-secondary"
                 placeholder="Enter genre"
                 [(ngModel)]="uploadGenre">
        </div>

        <!-- Audio File -->
        <div class="mb-3">
          <label class="form-label">Audio File</label>
          <input type="file"
                 class="form-control bg-black text-light border-secondary"
                 (change)="onAudioSelected($event)">
        </div>

        <!-- Cover Image -->
        <div class="mb-4">
          <label class="form-label">Cover Image</label>
          <input type="file"
                 class="form-control bg-black text-light border-secondary"
                 (change)="onCoverSelected($event)">
        </div>

        <div class="d-grid">
          <button class="btn btn-secondary btn-lg"
                  (click)="uploadSong()">
            Upload
          </button>
        </div>

      </div>

    </div>

  </div>

</div>
