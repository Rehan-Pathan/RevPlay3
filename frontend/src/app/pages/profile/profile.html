<div *ngIf="user" class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">

  <div class="col-11 col-sm-8 col-md-6 col-lg-4">

    <div class="card bg-dark text-light shadow-lg border border-secondary">

      <div class="card-body p-4 text-center">

        <h3 class="mb-4 fw-bold">Profile</h3>

        <!-- Notification Box -->
        <div *ngIf="message"
             class="p-2 mb-3 text-center rounded"
             [ngClass]="isSuccess ? 'bg-success text-white' : 'bg-danger text-white'">
          {{ message }}
        </div>

        <div class="mb-3">
          <img
            *ngIf="user.profileImagePath"
            [src]="'http://localhost:8080' + user.profileImagePath"
            width="130"
            height="130"
            class="rounded-circle shadow"
            style="object-fit: cover;"
          />
        </div>

        <ul class="list-group list-group-flush text-start mb-4">
          <li class="list-group-item bg-dark text-light border-secondary">
            <strong>Username:</strong> {{ user.username }}
          </li>
          <li class="list-group-item bg-dark text-light border-secondary">
            <strong>Email:</strong> {{ user.email }}
          </li>
          <li class="list-group-item bg-dark text-light border-secondary">
            <strong>Role:</strong> {{ user.role }}
          </li>
        </ul>

        <hr class="border-secondary">

        <input type="file"
               class="form-control bg-black text-light border-secondary mb-3"
               (change)="onFileSelected($event)">

        <div class="d-grid">
          <button class="btn btn-secondary"
                  (click)="uploadProfile()">
            Upload Profile Image
          </button>
        </div>

      </div>

    </div>

  </div>
</div>
