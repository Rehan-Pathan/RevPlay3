<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center">

  <div class="col-11 col-sm-8 col-md-6 col-lg-4">

    <div class="card bg-dark text-light shadow-lg border border-secondary">

      <div class="card-body p-4">

        <h3 class="text-center mb-4 fw-bold">Create Account</h3>

        <!-- Notification Box -->
        <div *ngIf="message"
             class="p-2 mb-3 text-center rounded"
             [ngClass]="isSuccess ? 'bg-success text-white' : 'bg-danger text-white'">
          {{ message }}
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

          <div class="mb-3">
            <label class="form-label">Username</label>
            <input class="form-control bg-black text-light border-secondary"
                   formControlName="username">
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email"
                   class="form-control bg-black text-light border-secondary"
                   formControlName="email">
          </div>

          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password"
                   class="form-control bg-black text-light border-secondary"
                   formControlName="password">
          </div>

          <div class="mb-4">
            <label class="form-label">Role</label>
            <select class="form-select bg-black text-light border-secondary"
                    formControlName="role">
              <option value="USER">USER</option>
              <option value="ARTIST">ARTIST</option>
            </select>
          </div>

          <div class="d-grid">
            <button class="btn btn-secondary">
              Register
            </button>
          </div>

        </form>

      </div>

    </div>

  </div>
</div>
