<h2 class="mb-4 fw-bold text-center">Songs</h2>

<!-- Notification -->
<div *ngIf="message"
     class="p-2 mb-3 text-center rounded col-md-6 mx-auto"
     [ngClass]="isSuccess ? 'bg-success text-white' : 'bg-danger text-white'">
  {{ message }}
</div>

<div class="mb-4 d-flex justify-content-center">
  <div class="col-md-6 d-flex">
    <input class="form-control me-2 bg-dark text-light border-secondary"
           placeholder="Search by title"
           [(ngModel)]="keyword">

    <button class="btn btn-secondary"
            (click)="search()">
      Search
    </button>
  </div>
</div>

<!-- Horizontal Scroll Container -->
<div class="col-md-10 mx-auto">

  <div class="song-row"
       *ngFor="let song of songs; trackBy: trackById">

    <!-- Cover -->
    <img [src]="'http://localhost:8080' + song.coverImagePath"
         class="song-cover">

    <!-- Song Info -->
    <div class="song-info">

      <div class="song-title">
        {{ song.title }}
      </div>

      <div class="song-artist">
        {{ song.artistUsername }}
      </div>

      <span class="badge bg-secondary mt-1">
        {{ song.genre }}
      </span>

    </div>

    <!-- Audio -->
    <div class="song-audio">
      <audio controls
             #audioPlayer
             (play)="handlePlay(song.id, audioPlayer)"
             (ended)="resetPlaySession(song.id)"
             [src]="'http://localhost:8080' + song.audioPath">
      </audio>
    </div>

    <!-- Playlist -->
    <div *ngIf="isLoggedIn" class="song-actions">

      <select class="form-select form-select-sm dark-select mb-1"
              [(ngModel)]="selectedPlaylist[song.id]">
        <option [ngValue]="null">Playlist</option>

        <option *ngFor="let p of playlists"
                [ngValue]="p.id">
          {{ p.name }}
        </option>

      </select>

      <button class="btn btn-sm btn-outline-light w-100"
              (click)="addToPlaylist(song.id)">
        Add
      </button>

    </div>

    <!-- Delete -->
   <div *ngIf="isArtist && currentUsername === song?.artistUsername"
     class="song-delete">

  <button class="btn btn-sm btn-danger"
          (click)="deleteSong(song.id)">
    Delete
  </button>

</div>

  </div>

</div>
